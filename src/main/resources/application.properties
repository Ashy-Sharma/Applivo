spring.application.name=Applivo

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:applivo}
spring.datasource.username=${DB_USERNAME:ash.applivo}
spring.datasource.password=${DB_PASSWORD:applivo}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate

server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

storage.base-upload-path=${STORAGE_BASE_PATH:./uploads}
storage.max-file-size-mb=${STORAGE_MAX_FILE_SIZE_MB:100}
storage.allowed-extensions=.apk

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

emulator.docker-image=${EMULATOR_IMAGE:budtmo/docker-android:emulator_13.0}
emulator.boot-timeout-seconds=${EMULATOR_BOOT_TIMEOUT_SECONDS:420}
emulator.max-concurrent-sessions=${EMULATOR_MAX_CONCURRENT_SESSIONS:1}
emulator.screenshot-android-path=/data/local/tmp/screen.png
emulator.screenshot-container-path=/tmp/screen.png
emulator.base-console-port=${EMULATOR_BASE_CONSOLE_PORT:5554}
emulator.base-adb-port=${EMULATOR_BASE_ADB_PORT:5555}
emulator.base-vnc-port=${EMULATOR_BASE_VNC_PORT:6080}
emulator.supported-abis=${EMULATOR_SUPPORTED_ABIS:x86_64}